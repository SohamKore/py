<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Markdown Viewer - Dark + Code Highlighting</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>
  <style>
    body {
      background-color: #1e1e1e;
      color: #d4d4d4;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 20px;
      line-height: 1.6;
    }

    #content {
      max-width: 800px;
      margin: auto;
    }

    pre {
      background-color: #2d2d2d;
      border-radius: 6px;
      padding: 15px;
      overflow-x: auto;
    }

    code {
      font-family: Consolas, monospace;
      font-size: 14px;
    }

    hr {
      border: none;
      border-top: 1px solid #3c3c3c;
      margin: 30px 0;
    }

    h1, h2, h3, h4, h5, h6 {
      color: #ffffff;
    }

    a {
      color: #4ea1ff;
    }

    strong {
      color: #ffffff;
    }
        .custom-cursor {

position: fixed !important;
pointer-events: none !important;
z-index: 9999 !important;
height: 70px !important; /* Adjust the height as needed */
}
  </style>
</head>
<body>

<div id="content"></div>
    <script>
        window.onload = function() {
            
       
                   var cursor = document.createElement('img');
                   cursor.src = 'https://i.gifer.com/1V94.gif';
                   cursor.classList.add('custom-cursor');
             
             // Add cursor to the document
             document.body.appendChild(cursor);
             
             // Adjust cursor position based on mouse movement
             document.addEventListener('mousemove', function(e) {
               console.log(1)
               var cursorOffsetX = cursor.width / 2;
               var cursorOffsetY = cursor.height / 2;
               cursor.style.left = (e.clientX - cursorOffsetX) + 'px';
               cursor.style.top = (e.clientY - cursorOffsetY) + 'px';
             }); }
       
           </script>
<script>
  const markdownContent = `
# • Seaborn Common Plot Arguments
---

# 📌 1. General Syntax (Applies to Most Seaborn Plots)

\`\`\`python
sns.plot_type(
    x=None,
    y=None,
    data=None,
    hue=None,
    size=None,
    style=None,
    palette=None,
    color=None
)
\`\`\`

---

# 🎯 2. Common Arguments (Used Across Most Plots)

## 🔹 Core Arguments

| Argument | Meaning                     | Possible Values      |
| -------- | --------------------------- | -------------------- |
| \`x\`      | X-axis variable             | Column name (string) |
| \`y\`      | Y-axis variable             | Column name (string) |
| \`data\`   | Dataset                     | DataFrame            |
| \`hue\`    | Grouping (color separation) | Column name          |
| \`size\`   | Size grouping               | Column name          |
| \`style\`  | Marker/line style grouping  | Column name          |

---

## 🎨 Color Arguments

| Argument  | Meaning             | Values                                                    |
| --------- | ------------------- | --------------------------------------------------------- |
| \`color\`   | Single color        | \`"red"\`, \`"blue"\`, \`"green"\`                              |
| \`palette\` | Multiple colors     | \`"deep"\`, \`"muted"\`, \`"pastel"\`, \`"dark"\`, \`"colorblind"\` |
| \`cmap\`    | Color map (heatmap) | \`"coolwarm"\`, \`"viridis"\`, \`"Blues"\`                      |

---
  `;

  // Render and highlight
  const html = marked.parse(markdownContent);
  document.getElementById('content').innerHTML = html;
  document.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
</script>

</body>
</html>
